name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-and-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run unit tests
        run: pytest

      - name: Run fast evaluation gate
        run: python -m app.evals.fast_eval --dataset evals/golden_queries.jsonl --report evals/reports/fast_eval_report.json

      - name: Run recommendation quality gate
        run: python -m app.evals.recommendation_quality --report evals/reports/rec_quality_check.json

      - name: Run latency budget check
        run: python -m app.evals.latency_check --report evals/reports/latency_check.json

      - name: Upload evaluation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-reports
          path: evals/reports/
