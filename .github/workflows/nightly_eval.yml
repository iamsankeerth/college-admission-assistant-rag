name: Nightly Eval

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  full-eval:
    runs-on: ubuntu-latest
    if: ${{ secrets.GEMINI_API_KEY != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run full evaluation suite
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -m app.evals.full_eval --dataset evals/golden_queries.jsonl --report evals/full_eval_report.json --markdown-report evals/full_eval_report.md

      - name: Upload full evaluation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-eval-report
          path: |
            evals/full_eval_report.json
            evals/full_eval_report.md
